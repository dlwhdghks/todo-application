<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#1a1a2e"/>

  <!-- Pixel grid decoration (subtle) -->
  <rect x="100" y="680" width="824" height="12" fill="#2a2a4e" rx="2"/>

  <!-- EXP Bar background -->
  <rect x="160" y="700" width="704" height="40" fill="#333" rx="4"/>

  <!-- EXP Bar filled -->
  <rect x="160" y="700" width="500" height="40" fill="#e94560" rx="4"/>

  <!-- Sword icon -->
  <g transform="translate(512, 340) scale(3.5)">
    <!-- Blade -->
    <rect x="-6" y="-80" width="12" height="100" fill="#c0c0c0" rx="3"/>
    <rect x="-4" y="-80" width="4" height="90" fill="#e0e0e0" rx="2"/>
    <!-- Guard -->
    <rect x="-30" y="20" width="60" height="10" fill="#f5a623" rx="3"/>
    <!-- Handle -->
    <rect x="-5" y="30" width="10" height="30" fill="#8b5cf6" rx="2"/>
    <!-- Pommel -->
    <circle cx="0" cy="65" r="8" fill="#f5a623"/>
  </g>

  <!-- "LU" text -->
  <text x="512" y="610" text-anchor="middle" font-family="monospace" font-weight="900" font-size="120" fill="#f5a623" letter-spacing="15">LU</text>

  <!-- Level text -->
  <text x="512" y="790" text-anchor="middle" font-family="monospace" font-weight="700" font-size="36" fill="#aaa">LEVEL UP</text>

  <!-- Stars decoration -->
  <text x="200" y="180" font-size="40" fill="#f5a623" opacity="0.6">*</text>
  <text x="800" y="220" font-size="30" fill="#4ecdc4" opacity="0.5">*</text>
  <text x="300" y="250" font-size="20" fill="#8b5cf6" opacity="0.4">*</text>
  <text x="750" y="150" font-size="25" fill="#e94560" opacity="0.5">*</text>
</svg>
